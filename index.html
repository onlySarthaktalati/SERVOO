<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVO | Premium Local Utility Fleet Grid</title>
    <style>
        :root {
            --pure-black: #000000;
            --nike-dark: #0a0a0a;
            --gray-card: #111111;
            --gray-border: #1a1a1a;
            --accent-neon: #00f0ff;
            --text-primary: #ffffff;
            --text-muted: #707070;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
        body { background-color: var(--pure-black); color: var(--text-primary); letter-spacing: -0.03em; overflow-x: hidden; }

        /* 🧭 Premium Monochromatic Navigation */
        nav.sys-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4%; height: 90px;
            border-bottom: 1px solid var(--gray-border);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.06em; text-decoration: none; color: #fff; }
        .logo span { color: var(--accent-neon); }
        
        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        
        .cta-btn { background: #fff; color: #000; padding: 12px 24px; font-size: 11px; font-weight: 800; text-transform: uppercase; border-radius: 30px; text-decoration: none; border: 1px solid #fff; transition: all 0.2s ease; }
        .cta-btn:hover { background: #000; color: #fff; }

        /* 🏎️ Cinematic Hero Segment */
        section.hero-viewport {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; min-height: 70vh; padding: 0 20px;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        }
        .hero-viewport h1 { font-size: 72px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.95; margin-bottom: 20px; }
        .hero-viewport p { color: var(--text-muted); font-size: 18px; max-width: 600px; line-height: 1.5; margin-bottom: 35px; }

        /* 📋 Premium Grid Catalog Selection */
        section.catalog-section { max-width: 1300px; margin: 0 auto 100px; padding: 0 4%; }
        .section-header { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 30px; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .utility-premium-card { background: var(--gray-card); border: 1px solid var(--gray-border); padding: 35px; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; min-height: 220px; transition: border-color 0.3s; }
        .utility-premium-card:hover { border-color: #333; }
        
        .card-top h3 { font-size: 22px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
        .card-top p { color: var(--accent-neon); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px; }
        .price-tag { font-size: 24px; font-weight: 900; }
        .price-tag span { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        
        .book-now-trigger { background: transparent; border: 1px solid #333; color: white; padding: 12px 24px; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; border-radius: 20px; }
        .book-now-trigger:hover { background: white; color: black; border-color: white; }
    </style>
</head>
<body>

    <nav class="sys-nav">
        <a href="index.html" class="logo">SERVO<span>.</span></a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="register.html">Fleet Registry</a>
            <a href="login.html">Command Console</a>
            <a href="dashboard.html" class="cta-btn">Book Now</a>
        </div>
    </nav>

    <section class="hero-viewport">
        <h1>Precision Logistics.<br>On Demand Matrix.</h1>
        <p>Deploy tier-1 engineering professionals and computational field technicians straight to your dynamic grid location with zero latency latency.</p>
        <a href="dashboard.html" class="cta-btn" style="padding: 16px 40px; font-size: 13px;">Initialize Booking Engine</a>
    </section>

    <section class="catalog-section">
        <div class="section-header">Active Available Capabilities Catalog</div>
        <div class="grid-container" id="landingGridCatalog">
            </div>
    </section>

    <script>
        // Connect public structural data directly to UI templates
        fetch('https://servoo0-backend.onrender.com/api/services')
            .then(res => res.json())
            .then(services => {
                const container = document.getElementById('landingGridCatalog');
                services.forEach(s => {
                    container.innerHTML += `
                        <div class="utility-premium-card">
                            <div class="card-top">
                                <h3>${s.name}</h3>
                                <p>// Status Active Node [${s.status}]</p>
                            </div>
                            <div class="card-bottom">
                                <div class="price-tag">₹${s.basePrice}<span>${s.rateType}</span></div>
                                <button class="book-now-trigger" onclick="window.location.href='dashboard.html'">Book Now</button>
                            </div>
                        </div>`;
                });
            });
    </script>
</body>
</html>
