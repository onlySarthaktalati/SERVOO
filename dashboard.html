<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVO | Operations Command Console</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --black: #000000;
            --dark: #080808;
            --gray-card: #111111;
            --gray-border: #1a1a1a;
            --accent: #00f0ff;
            --accent-admin: #ff0055;
            --text-primary: #ffffff;
            --text-muted: #666666;
            --green: #00ffaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--black); color: var(--text-primary); letter-spacing: -0.02em; overflow: hidden; }

        header.sys-navbar { display: flex; justify-content: space-between; align-items: center; padding: 0 4%; background: var(--black); border-bottom: 1px solid var(--gray-border); height: 85px; }
        .left-controls { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 24px; font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; }
        .logo span { color: var(--accent); }

        /* Tactical Mode Toggle Switch */
        .toggle-wrapper { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .toggle-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }
        .toggle-label.active { color: white; }
        .switch-track { width: 50px; height: 26px; background: #1a1a1a; border: 1px solid var(--gray-border); border-radius: 30px; position: relative; }
        .switch-thumb { width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 4px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body.admin-mode-active .switch-track { background: rgba(255, 0, 85, 0.1); border-color: var(--accent-admin); }
        body.admin-mode-active .switch-thumb { left: 26px; background: var(--accent-admin); }
        body.admin-mode-active .logo span { color: var(--accent-admin); }

        .system-ticker-bar { background: #050505; border-bottom: 1px solid var(--gray-border); padding: 8px 4%; font-size: 11px; font-family: monospace; color: var(--accent); display: flex; gap: 15px; align-items: center; }
        .ticker-label { background: #111; padding: 2px 6px; border: 1px solid #222; font-weight: bold; }

        /* Split-Pane Grid Core Configuration */
        .grid-panel-viewport { display: none; grid-template-columns: 1fr 440px; gap: 0; height: calc(100vh - 122px); }
        .grid-panel-viewport.active { display: grid; }
        
        .map-canvas-container { background: var(--dark); position: relative; }
        .map-element { width: 100%; height: 100%; }
        
        .control-sidebar-panel { background: var(--gray-card); border-l: 1px solid var(--gray-border); padding: 25px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .search-field { width: 100%; background: var(--black); border: 1px solid var(--gray-border); padding: 14px; color: white; font-size: 14px; border-radius: 4px; outline: none; margin-bottom: 5px; }
        .search-field:focus { border-color: var(--accent); }

        .service-action-card { background: var(--black); border: 1px solid var(--gray-border); padding: 20px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .service-action-card:hover { border-color: white; }
        .card-title h3 { font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .card-meta { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        .card-price { text-align: right; font-size: 19px; font-weight: 900; }
        .card-price span { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

        .pipeline-card { background: var(--black); border: 1px solid var(--gray-border); padding: 20px; margin-bottom: 15px; border-radius: 4px; border-left: 3px solid var(--accent-admin); }
        .pipeline-card h4 { font-size: 16px; text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 6px; }
        .pipeline-card p { font-size: 13px; color: #888; line-height: 1.5; margin-bottom: 12px; }
        .badge-status { background: rgba(0, 255, 170, 0.1); color: var(--green); padding: 2px 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .resolve-btn { background: transparent; border: 1px solid #333; color: #ff3b3b; padding: 6px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .resolve-btn:hover { background: #ff3b3b; color: white; border-color: #ff3b3b; }

        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* Modal Forms & Overlays */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--gray-card); border: 1px solid var(--gray-border); padding: 40px; width: 90%; max-width: 480px; position: relative; border-radius: 4px; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: var(--text-muted); cursor: pointer; font-size: 22px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .input-group label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input { background: var(--black); border: 1px solid var(--gray-border); padding: 14px; color: white; font-size: 15px; border-radius: 4px; outline: none; }
        .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 30px; }

        .radar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        .radar-ring { width: 120px; height: 120px; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 40px; }
        .radar-ring::after { content: ''; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 50%; position: absolute; animation: radarPulse 1.8s infinite linear; }
        .radar-title { font-size: 14px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.15em; }
        .radar-ticker { color: var(--text-muted); font-size: 13px; font-family: monospace; }
        @keyframes radarPulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
    </style>
</head>
<body>

    <header class="sys-navbar">
        <div class="left-controls">
            <a href="index.html" class="logo">SERVO<span>.</span></a>
            <div class="toggle-wrapper" onclick="toggleSystemMode()">
                <span class="toggle-label active" id="toggleLabelConsumer">User Space</span>
                <div class="switch-track"><div class="switch-thumb"></div></div>
                <span class="toggle-label" id="toggleLabelAdmin">Admin Radar</span>
            </div>
        </div>
    </header>

    <div class="system-ticker-bar">
        <span class="ticker-label">Operational Feed</span>
        <span id="tickerMessage">[GRID]: Connection secured to primary node cluster.</span>
    </div>

    <main class="grid-panel-viewport active" id="consumer-view">
        <div class="map-canvas-container"><div id="consumerMap" class="map-element"></div></div>
        <div class="control-sidebar-panel">
            <input type="text" id="catalogSearch" class="search-field" placeholder="Filter operational capability..." oninput="filterCatalog()">
            <div id="servicesTarget" style="display:flex; flex-direction:column; gap:12px;"></div>
        </div>
    </main>

    <main class="grid-panel-viewport" id="admin-view">
        <div class="map-canvas-container"><div id="adminRadarMap" class="map-element"></div></div>
        <div class="control-sidebar-panel" style="background:#0c0c0c;">
            <h3 style="font-size:12px; text-transform:uppercase; color:var(--accent-admin); margin-bottom:15px; letter-spacing:0.1em;">Live Grid Telemetry Dispatches</h3>
            <div id="adminLogsTarget"></div>
        </div>
    </main>

    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <h2 id="modalTargetTitle" style="font-size:22px; font-weight:900; margin-bottom:20px;">DISPATCH PIPELINE</h2>
            <form id="bookingForm">
                <input type="hidden" id="selectedService">
                <div class="input-group">
                    <label>Client Reference Identity Name</label>
                    <input type="text" id="custName" required placeholder="Enter primary booking name">
                </div>
                <div class="input-group">
                    <label>Mobile Handset Line</label>
                    <input type="tel" id="custPhone" required placeholder="10-digit handset string">
                </div>
                <div class="input-group">
                    <label>Target Flat Unit Location Parameters</label>
                    <input type="text" id="custAddr" required placeholder="Block, Floor, Flat Layout Location">
                </div>
                <button type="submit" class="submit-btn">Authorize Dispatch Request</button>
            </form>
        </div>
    </div>

    <div class="radar-overlay" id="radarOverlay">
        <div class="radar-ring"><span style="font-size:28px;">📡</span></div>
        <div class="radar-title" id="radarStatusHeader">Pinging Fleet Matrix...</div>
        <div class="radar-ticker" id="radarTicker">Initializing connection handshakes...</div>
    </div>

    <script>
        const BASE_API_URL = 'https://servoo0-backend.onrender.com';
        let cMap, aMap;
        let adminMarkers = [];
        let dataCache = [];

        function toggleSystemMode() {
            const isAdmin = document.body.classList.toggle('admin-mode-active');
            document.getElementById('toggleLabelConsumer').classList.toggle('active', !isAdmin);
            document.getElementById('toggleLabelAdmin').classList.toggle('active', isAdmin);
            
            document.getElementById('consumer-view').classList.toggle('active', !isAdmin);
            document.getElementById('admin-view').classList.toggle('active', isAdmin);

            setTimeout(() => { cMap.invalidateSize(); aMap.invalidateSize(); }, 50);
            if (isAdmin) loadAdminLogs();
        }

        function initMaps() {
            cMap = L.map('consumerMap', {zoomControl: false}).setView([26.9124, 75.7873], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(cMap);

            aMap = L.map('adminRadarMap', {zoomControl: false}).setView([26.9124, 75.7873], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(aMap);
        }

        function pullData() {
            Promise.all([
                fetch(`${BASE_API_URL}/api/services`).then(res => res.json()),
                fetch(`${BASE_API_URL}/api/providers`).then(res => res.json())
            ]).then(([services, providers]) => {
                dataCache = services;
                providers.forEach(p => {
                    L.circleMarker([p.lat, p.lng], { color: '#00f0ff', fillColor: '#00f0ff', fillOpacity: 0.4, radius: 7 }).addTo(cMap);
                });
                renderCatalog(dataCache);
            });
        }

        function renderCatalog(items) {
            const container = document.getElementById('servicesTarget');
            container.innerHTML = '';
            items.forEach(s => {
                container.innerHTML += `
                    <div class="service-action-card" onclick="openModal('${s.name}')">
                        <div class="card-title"><h3>${s.name}</h3><div class="card-meta">${s.status}</div></div>
                        <div class="card-price">₹${s.basePrice}<span>${s.rateType}</span></div>
                    </div>`;
            });
        }

        function filterCatalog() {
            const query = document.getElementById('catalogSearch').value.toLowerCase();
            renderCatalog(dataCache.filter(s => s.name.toLowerCase().includes(query)));
        }

        function loadAdminLogs() {
            fetch(`${BASE_API_URL}/api/bookings`).then(res => res.json()).then(bookings => {
                adminMarkers.forEach(m => aMap.removeLayer(m));
                adminMarkers = [];
                const container = document.getElementById('adminLogsTarget');
                container.innerHTML = bookings.length === 0 ? '<p style="color:var(--text-muted); text-align:center; padding-top:20px;">No active dispatches.</p>' : '';
                
                bookings.forEach(b => {
                    const m = L.circleMarker([b.lat, b.lng], { color: '#ff0055', fillColor: '#ff0055', fillOpacity: 0.6, radius: 9 }).addTo(aMap);
                    adminMarkers.push(m);
                    container.innerHTML += `
                        <div class="pipeline-card">
                            <h4>${b.customerName} <span class="badge-status">${b.status}</span></h4>
                            <p><b>Required:</b> ${b.serviceType}<br><b>Address:</b> ${b.flatAddress}<br><b>Partner:</b> ${b.assignedPartner}</p>
                            <button class="resolve-btn" onclick="resolveBooking('${b._id}')">Resolve Case</button>
                        </div>`;
                });
            });
        }

        function resolveBooking(id) { fetch(`${BASE_API_URL}/api/bookings/${id}`, { method: 'DELETE' }).then(() => loadAdminLogs()); }
        function openModal(name) { document.getElementById('selectedService').value = name; document.getElementById('bookingModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('selectedService').value;
            closeModal();
            document.getElementById('radarOverlay').style.display = 'flex';
            
            setTimeout(() => {
                fetch(`${BASE_API_URL}/api/book-service`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        customerName: document.getElementById('custName').value,
                        customerPhone: document.getElementById('custPhone').value,
                        serviceType: type,
                        flatAddress: document.getElementById('custAddr').value
                    })
                }).then(() => {
                    document.getElementById('radarOverlay').style.display = 'none';
                    document.getElementById('bookingForm').reset();
                    pullData();
                });
            }, 2000);
        });

        initMaps();
        pullData();
        setInterval(() => { if(document.body.classList.contains('admin-mode-active')) loadAdminLogs(); }, 5000);
    </script>
</body>
</html>
