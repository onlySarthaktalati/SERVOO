<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVO | Fleet Asset Registration</title>
    <style>
        :root { --black: #000; --dark: #0a0a0a; --border: #1a1a1a; --muted: #666; --accent: #00f0ff; }
        * { margin:0; padding:0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--black); color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav.simple-nav { padding: 30px 4%; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: 900; color: #fff; text-decoration: none; text-transform: uppercase; }
        
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { background: var(--dark); border: 1px solid var(--border); padding: 50px; width: 100%; max-width: 500px; border-radius: 4px; }
        .auth-card h2 { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; letter-spacing: -0.04em; }
        .auth-card p { color: var(--muted); font-size: 13px; margin-bottom: 30px; }
        
        .input-box { display: flex; flex-direction: column; margin-bottom: 20px; }
        .input-box label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
        .input-box input, .input-box select { background: var(--black); border: 1px solid var(--border); padding: 14px; color: #fff; font-size: 15px; border-radius: 4px; outline: none; -webkit-appearance: none; }
        .input-box input:focus, .input-box select:focus { border-color: var(--accent); }
        
        .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 16px; font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 30px; margin-top: 10px; transition: 0.2s; }
        .submit-btn:hover { background: var(--black); color: #fff; border: 1px solid #fff; }
        .switch-prompt { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
        .switch-prompt a { color: #fff; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="simple-nav">
        <a href="index.html" class="logo">SERVO.</a>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Fleet Onboarding</h2>
            <p>Deploy your trade parameters inside our spatial matrix framework.</p>
            <form id="fleetRegistrationForm">
                <div class="input-box">
                    <label>Full Identity Name</label>
                    <input type="text" id="partnerName" placeholder="Enter full legal name" required>
                </div>
                <div class="input-box">
                    <label>Operational Domain Tier</label>
                    <select id="partnerTrade" required>
                        <option value="Electrician">Electrician (Power & Grid Balance)</option>
                        <option value="Plumber">Plumber (Fluid Routing Infrastructure)</option>
                        <option value="AC Repair">AC Repair (Thermal Fluid Systems)</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>Smartphone Connection Line</label>
                    <input type="tel" id="partnerPhone" placeholder="10-digit communication vector" required>
                </div>
                <div class="input-box">
                    <label>Operational Center Location Matrix</label>
                    <input type="text" id="partnerCity" placeholder="e.g. Jaipur" required>
                </div>
                <button type="submit" class="submit-btn">Deploy System Asset Node</button>
            </form>
            <div class="switch-prompt">Already authenticated? <a href="login.html">Access terminal panel</a></div>
        </div>
    </main>

    <script>
        document.getElementById('fleetRegistrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch('https://servoo0-backend.onrender.com/api/register-provider', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('partnerName').value,
                    trade: document.getElementById('partnerTrade').value,
                    phone: document.getElementById('partnerPhone').value,
                    city: document.getElementById('partnerCity').value
                })
            }).then(res => res.json()).then(data => {
                alert(data.message);
                window.location.href = 'dashboard.html';
            });
        });
    </script>
</body>
</html>
