<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVO | Force Mobilization</title>
    <style>
        :root { --black: #000000; --dark: #0a0a0a; --gray: #121212; --accent: #00f0ff; --text: #ffffff; --muted: #666666; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
        body { background-color: var(--black); color: var(--text); padding-bottom: 100px; letter-spacing: -0.03em; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 8%; background: var(--black); border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 28px; font-weight: 900; text-decoration: none; color: white; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        .split-container { display: grid; grid-template-columns: 1fr 1fr; max-width: 1200px; margin: 80px auto 0 auto; gap: 80px; padding: 0 20px; }
        h1 { font-size: 64px; font-weight: 900; text-transform: uppercase; line-height: 0.95; margin-bottom: 20px; }
        p { color: var(--muted); font-size: 18px; line-height: 1.5; }

        .form-panel { background: var(--gray); border: 1px solid #1c1c1c; padding: 50px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 25px; }
        .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .form-group input, .form-group select { background: var(--black); border: 1px solid #222; padding: 14px; color: white; font-size: 16px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        .submit-btn { width: 100%; background: white; color: black; border: none; padding: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SERVO<span>.</span></a>
        <div class="nav-links">
            <a href="index.html">Request Force</a>
            <a href="join.html" class="active">Fleet Onboarding</a>
            <a href="admin.html">Dispatch HQ</a>
        </div>
    </nav>

    <div class="split-container">
        <div>
            <h1>MONETIZE YOUR SKILL WITH ABSOLUTE POWER.</h1>
            <p>Skip contractors, middle brokers, and localization boundaries. Receive direct real-time alerts right on your unit matrix as customers place active dispatches inside your radius tier zone.</p>
        </div>
        <div class="form-panel">
            <form id="onboardForm">
                <div class="form-group">
                    <label>Legal Identification Name</label>
                    <input type="text" id="pName" placeholder="Enter full identity name" required>
                </div>
                <div class="form-group">
                    <label>Operational Core Domain Capability</label>
                    <select id="pTrade" required>
                        <option value="Electrician">Electrician (Core Infrastructure)</option>
                        <option value="Plumber">Plumber (Fluid Handling)</option>
                        <option value="AC Repair">AC Repair (Thermal Management)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Active Handset Number</label>
                    <input type="tel" id="pPhone" placeholder="10-digit interface number" required>
                </div>
                <div class="form-group">
                    <label>Active Sector City Location</label>
                    <input type="text" id="pCity" placeholder="e.g. Jaipur" required>
                </div>
                <button type="submit" class="submit-btn">Deploy into active grid</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('onboardForm').addEventListener('submit', function(e){
            e.preventDefault();
            fetch('http://localhost:3000/api/register-provider', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('pName').value,
                    trade: document.getElementById('pTrade').value,
                    phone: document.getElementById('pPhone').value,
                    city: document.getElementById('pCity').value
                })
            }).then(res => res.json()).then(data => {
                alert(data.message);
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
